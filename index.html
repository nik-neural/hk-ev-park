<!DOCTYPE html>
<html lang="zh-HK" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="全香港 EV 停車場搜尋，即時空位一目了然" />
  <title>香港 EV 泊車</title>

  <!-- PWA manifest injected at runtime (single-file friendly) -->
  <link rel="manifest" id="pwa-manifest" />
  <link rel="apple-touch-icon" id="apple-icon" />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: { DEFAULT: '#0f172a', card: '#1e293b', muted: '#334155' }
          }
        }
      }
    };
  </script>

  <style>
    /* Leaflet + mobile tweaks */
    #map { touch-action: none; }
    .leaflet-container { background: #0f172a; font-family: inherit; }
    .marker-pin {
      width: 28px; height: 28px; border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg); border: 2px solid #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,.45);
    }
    .marker-inner {
      width: 100%; height: 100%; border-radius: 50% 50% 50% 0;
      transform: rotate(45deg); display: flex; align-items: center;
      justify-content: center; font-size: 12px; font-weight: 700;
    }
    .sheet-enter { animation: slideUp .25s ease-out; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .safe-bottom { padding-bottom: max(1rem, env(safe-area-inset-bottom)); }
    .safe-top { padding-top: max(0.5rem, env(safe-area-inset-top)); }
    /* Hide scrollbar on list but keep scroll */
    .hide-scroll::-webkit-scrollbar { display: none; }
    .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>

<body class="h-full bg-slate-950 text-slate-100 overflow-hidden">

  <!-- ===== APP SHELL ===== -->
  <div id="app" class="h-full flex flex-col relative">

    <!-- Header -->
    <header class="safe-top z-30 bg-slate-950/90 backdrop-blur border-b border-slate-800 px-3 py-2 shrink-0">
      <div class="flex items-center justify-between gap-2">
        <div class="min-w-0">
          <h1 class="text-lg font-bold tracking-tight truncate">⚡ 香港 EV 泊車</h1>
          <p class="text-xs text-slate-400 truncate">全香港</p>
        </div>
        <div class="flex items-center gap-1.5 shrink-0">
          <button id="btn-locate" type="button" title="我嘅位置"
            class="tap-target w-11 h-11 rounded-xl bg-slate-800 active:bg-slate-700 flex items-center justify-center text-lg">
            📍
          </button>
          <button id="btn-refresh" type="button" title="更新資料"
            class="tap-target w-11 h-11 rounded-xl bg-emerald-600 active:bg-emerald-500 flex items-center justify-center text-lg">
            ↻
          </button>
        </div>
      </div>

      <!-- Search -->
      <div class="relative mt-2">
        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm pointer-events-none">🔍</span>
        <input id="search-input" type="search" enterkeyhint="search" autocomplete="off"
          placeholder="搜尋地區或停車場，例如：尖沙咀、觀塘…"
          class="w-full pl-9 pr-9 py-2.5 rounded-xl bg-slate-800 border border-slate-700
                 text-sm text-slate-100 placeholder:text-slate-500
                 focus:outline-none focus:border-emerald-600 focus:ring-1 focus:ring-emerald-600" />
        <button id="search-clear" type="button" hidden
          class="absolute right-2 top-1/2 -translate-y-1/2 w-7 h-7 rounded-full
                 bg-slate-700 text-slate-400 text-sm leading-none active:bg-slate-600"
          aria-label="清除搜尋">×</button>
      </div>

      <!-- Filters -->
      <div class="flex gap-2 mt-2 overflow-x-auto hide-scroll pb-1">
        <label class="filter-chip shrink-0">
          <input type="checkbox" id="filter-ev" checked class="sr-only peer" />
          <span class="chip peer-checked:bg-emerald-600 peer-checked:border-emerald-500">⚡ 淨係 EV</span>
        </label>
        <label class="filter-chip shrink-0">
          <input type="checkbox" id="filter-near" class="sr-only peer" />
          <span class="chip peer-checked:bg-blue-600 peer-checked:border-blue-500">📍 附近</span>
        </label>
        <label class="filter-chip shrink-0">
          <input type="checkbox" id="filter-spaces" class="sr-only peer" />
          <span class="chip peer-checked:bg-amber-600 peer-checked:border-amber-500">🅿️ 有空位</span>
        </label>
      </div>
      <p id="status-bar" class="text-xs text-slate-500 mt-1 truncate">載入中…</p>
    </header>

    <!-- Map -->
    <div id="map" class="flex-1 min-h-0 z-0"></div>

    <!-- Bottom list (peek) -->
    <div id="list-panel"
      class="safe-bottom z-20 bg-slate-900/95 backdrop-blur border-t border-slate-700 rounded-t-2xl shadow-2xl
             max-h-[42vh] flex flex-col transition-all duration-300">
      <button id="list-handle" type="button" class="w-full py-2 flex flex-col items-center" aria-label="展開列表">
        <span class="w-10 h-1 rounded-full bg-slate-600 mb-1"></span>
        <span id="list-summary" class="text-sm font-medium text-slate-300">0 個停車場</span>
      </button>
      <div id="list-scroll" class="overflow-y-auto hide-scroll px-3 pb-3 space-y-2 flex-1 min-h-0"></div>
    </div>

    <!-- Detail sheet -->
    <div id="detail-overlay" class="hidden fixed inset-0 z-40 bg-black/60" aria-hidden="true"></div>
    <div id="detail-sheet"
      class="hidden fixed inset-x-0 bottom-0 z-50 bg-slate-900 border-t border-slate-700 rounded-t-2xl
             max-h-[85vh] overflow-y-auto safe-bottom sheet-enter">
      <div class="p-4 space-y-4" id="detail-content"></div>
    </div>

    <!-- Offline banner -->
    <div id="offline-banner"
      class="hidden fixed top-14 left-3 right-3 z-50 bg-amber-900/90 border border-amber-700 text-amber-100
             text-sm px-3 py-2 rounded-xl text-center">
      離線中 — 顯示快取資料
    </div>
  </div>

  let CARPARKS = [];

  /* ----- PWA: manifest + icons ----- */
  function setupPWA() {
    const iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
      <rect width="512" height="512" rx="96" fill="#059669"/>
      <text x="256" y="300" text-anchor="middle" font-size="200" fill="white">⚡</text>
    </svg>`;
    const iconUrl = 'data:image/svg+xml,' + encodeURIComponent(iconSvg);
    document.getElementById('apple-icon').href = iconUrl;

    const manifest = {
      name: '香港 EV 泊車',
      short_name: 'EV 泊車',
      description: '全香港 EV 停車場即時空位',
      start_url: location.origin + location.pathname + location.search,
      display: 'standalone',
      background_color: '#0f172a',
      theme_color: '#059669',
      orientation: 'portrait-primary',
      icons: [
        { src: iconUrl, sizes: '512x512', type: 'image/svg+xml', purpose: 'any maskable' }
      ]
    };
    const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
    document.getElementById('pwa-manifest').href = URL.createObjectURL(manifestBlob);

    // Inline service worker via Blob URL
    const swCode = `
      const CACHE = 'hkev-static-v${APP_VERSION}';
      const PRECACHE = [
        'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css',
        'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js',
        'https://cdn.tailwindcss.com'
      ];
      self.addEventListener('install', e => {
        e.waitUntil(caches.open(CACHE).then(c => c.addAll(PRECACHE).catch(() => {})));
        self.skipWaiting();
      });
      self.addEventListener('activate', e => {
        e.waitUntil(self.clients.claim());
      });
      self.addEventListener('fetch', e => {
        const url = e.request.url;
        // Cache CDN assets; network-first for API with cache fallback
        if (url.includes('api.data.gov.hk')) {
          e.respondWith(
            fetch(e.request).then(res => {
              const clone = res.clone();
              caches.open(CACHE).then(c => c.put(e.request, clone));
              return res;
            }).catch(() => caches.match(e.request))
          );
          return;
        }
        if (PRECACHE.some(p => url.startsWith(p.split('?')[0]))) {
          e.respondWith(caches.match(e.request).then(c => c || fetch(e.request)));
          return;
        }
      });
    `;
    if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
      const swBlob = new Blob([swCode], { type: 'application/javascript' });
      navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(() => {});
    }
  }

  /* ----- localStorage: group reports ----- */
  function loadReports() {
    try { return JSON.parse(localStorage.getItem(STORAGE_REPORTS) || '{}'); }
    catch { return {}; }
  }
  function saveReport(parkId, patch) {
    reports[parkId] = {

  function loadVacancyCache() {
    try {
      const c = JSON.parse(localStorage.getItem(STORAGE_CACHE) || 'null');
      if (c && Date.now() - c.ts < 30 * 60_000) return c.data;
    } catch {}
    return null;
  }
  function saveVacancyCache(data) {
    localStorage.setItem(STORAGE_CACHE, JSON.stringify({ ts: Date.now(), data }));
  }

  function hkExtentStr() {
    return [HK_BOUNDS.west, HK_BOUNDS.south, HK_BOUNDS.east, HK_BOUNDS.north].join(',');
  }

  function loadCarParkCache() {
    try {
      const c = JSON.parse(localStorage.getItem(STORAGE_CARPARKS) || 'null');
      if (c && Date.now() - c.ts < 24 * 60 * 60_000) return c.data;
    } catch {}
    return null;
  }

  function saveCarParkCache(data) {
    localStorage.setItem(STORAGE_CARPARKS, JSON.stringify({ ts: Date.now(), data }));
  }

  function parseEvChargeFromRemark(rm) {
    if (!rm) return { detail: null, min: null };
    const prices = [...rm.matchAll(/([\d.]+)\s*\/?\s*kWh/gi)].map(m => parseFloat(m[1]));
    const detail = rm.replace(/HKD\$?/gi, '$').replace(/,/g, '，').trim();
    return { detail, min: prices.length ? Math.min(...prices) : null };
  }

  function extractPricing(pc) {
    const hourly = pc?.hourlyCharges || [];
    const parkHourly = hourly.find(h => h.price != null)?.price ?? null;
    let evChargeDetail = null, evChargeMin = null;
    for (const h of hourly) {
      const rm = (h.remark || '').trim();
      if (!/kWh|kwh|度電|充電/i.test(rm)) continue;
      const parsed = parseEvChargeFromRemark(rm);
      if (parsed.detail) {
        evChargeDetail = parsed.detail;
        evChargeMin = parsed.min;
        break;
      }
    }
    return { parkHourly, evChargeDetail, evChargeMin };
  }

  function applyPricingFields(cp, pricing, overrideKey) {
    const o = CURATED_OVERRIDES[overrideKey || cp.govId || cp.id] || {};
    return {
      ...cp,
      parkHourly: o.parkHourly ?? pricing.parkHourly ?? cp.parkHourly ?? null,
      evChargeDetail: o.evChargeDetail ?? pricing.evChargeDetail ?? cp.evChargeDetail ?? null,
      evChargeMin: o.evChargeMin ?? pricing.evChargeMin ?? cp.evChargeMin ?? null
    };
  }

  function priceSummary(cp) {
    const parts = [];
    if (cp.parkHourly != null) parts.push(`泊車 $${cp.parkHourly}/hr`);
    if (cp.evChargeMin != null) parts.push(`充電 ~$${cp.evChargeMin}/kWh`);
    else if (cp.evChargeDetail) {
      const s = cp.evChargeDetail.length > 22 ? cp.evChargeDetail.slice(0, 22) + '…' : cp.evChargeDetail;
      parts.push(s);
    }
    return parts.length ? parts.join(' · ') : null;
  }

  function enrichSeedPark(p) {
    const o = CURATED_OVERRIDES[p.govId] || {};
    return applyPricingFields({
      ...p,
      name: o.name || p.name,
      nameEn: o.nameEn || null,
      note: o.note || p.note || (p.evSpaces ? `政府數據：${p.evSpaces} 個 EV 位` : null),
      hasEV: o.hasEV !== undefined ? o.hasEV : p.hasEV,
      subDistrict: p.subDistrict || ''
    }, extractPricing({ hourlyCharges: p.parkHourly != null ? [{ price: p.parkHourly }] : [] }), p.govId);
  }

  function buildSeedCarParks() {
    const byId = new Map();
    for (const p of SEED_EV_PARKS) byId.set(p.id, enrichSeedPark(p));
    for (const extra of CURATED_EXTRAS) byId.set(extra.id, { ...extra });
    return [...byId.values()];
  }

  function seedGovIds() {
    return [...new Set(buildSeedCarParks().map(c => c.govId).filter(Boolean))];
  }

  function restoreLastPosition() {
    try {
      const raw = sessionStorage.getItem(STORAGE_LAST_POS);
      if (!raw) return false;
      const pos = JSON.parse(raw);
      if (pos?.lat && pos?.lng) {
        userPos = pos;
        showUserLocation(pos.lat, pos.lng);
        return true;
      }
    } catch {}
    return false;
  }

  function saveLastPosition() {
    if (userPos) sessionStorage.setItem(STORAGE_LAST_POS, JSON.stringify(userPos));
  }

  function sortByDistance(list, anchor) {
    return [...list].sort((a, b) =>
      haversineKm(anchor.lat, anchor.lng, a.lat, a.lng) -
      haversineKm(anchor.lat, anchor.lng, b.lat, b.lng)
    );
  }

  function getPositionAnchor() {
    return userPos || { lat: MAP_CENTER[0], lng: MAP_CENTER[1] };
  }

  function buildCarParkFromGov(r) {
    const govId = r.park_Id;
    const o = CURATED_OVERRIDES[govId] || {};
    const fac = r.facilities || [];
    const pc = r.privateCar || {};
    const hasEV = o.hasEV !== undefined ? o.hasEV : fac.includes('evCharger');
    const evSpaces = pc.spaceEV > 0 ? pc.spaceEV : (o.evSpaces ?? null);
    return applyPricingFields({
      id: String(govId),
      govId,
      name: o.name || r.name,
      nameEn: o.nameEn || null,
      address: o.address || r.displayAddress || '',
      lat: r.latitude,
      lng: r.longitude,
      hasEV,
      evSpaces,
      note: o.note || (hasEV && evSpaces ? `政府數據：${evSpaces} 個 EV 位` : null),
      district: r.district || r.address?.dcDistrict || '',
      subDistrict: r.address?.subDistrict || ''
    }, extractPricing(pc), govId);
  }

  async function fetchCarParkInfo(force = false) {
    if (!force) {
      const cached = loadCarParkCache();
      if (cached?.length) {
        CARPARKS = cached;
        return true;
      }
    }
    setStatus('正在載入全港停車場…');
    try {
      const res = await fetch(
        `${API_BASE}?data=info&vehicleTypes=privateCar&extent=${hkExtentStr()}&lang=zh_TW`
      );
      if (!res.ok) throw new Error('API ' + res.status);
      const json = await res.json();
      const byId = new Map();
      for (const r of json.results || []) byId.set(String(r.park_Id), buildCarParkFromGov(r));
      for (const extra of CURATED_EXTRAS) byId.set(extra.id, { ...extra });
      CARPARKS = [...byId.values()];
      saveCarParkCache(CARPARKS);
      return true;
    } catch (err) {
      console.warn('Car park info fetch failed:', err);
      const cached = loadCarParkCache();
      if (cached?.length) {
        CARPARKS = cached;
        setStatus('使用快取嘅停車場資料');
        return false;
      }
      CARPARKS = [...CURATED_EXTRAS];
      setStatus('停車場資料載入失敗');
      return false;
    }
  }

  function mergeVacancyResults(results) {
    for (const r of results || []) {
      const pc = r.privateCar?.[0];
      if (pc) vacancyMap[r.park_Id] = pc;
    }
  }

  /* ----- API ----- */
  async function fetchVacancyForIds(govIds, quiet = false) {
    if (!govIds.length) return false;
    if (!quiet) setStatus('正在攞附近空位…');
    try {
      const res = await fetch(
        `${API_BASE}?data=vacancy&vehicleTypes=privateCar&carparkIds=${govIds.join(',')}&lang=zh_TW`
      );
      if (!res.ok) throw new Error('API ' + res.status);
      mergeVacancyResults((await res.json()).results);
      lastFetchTime = new Date();
      document.getElementById('offline-banner').classList.add('hidden');
      return true;
    } catch (err) {
      console.warn('Quick vacancy fetch failed:', err);
      return false;
    }
  }

  async function fetchVacancy() {
    const url = `${API_BASE}?data=vacancy&vehicleTypes=privateCar&extent=${hkExtentStr()}&lang=zh_TW`;

    if (!bootstrapActive) setStatus('正在攞即時空位…');
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error('API ' + res.status);
      const json = await res.json();
      const map = {};
      for (const r of json.results || []) {
        const pc = r.privateCar?.[0];
        if (pc) map[r.park_Id] = pc;
      }
      vacancyMap = map;
      lastFetchTime = new Date();
      saveVacancyCache(map);
      document.getElementById('offline-banner').classList.add('hidden');
      setStatus(`已更新 ${formatTime(lastFetchTime)} · 全港 ${Object.keys(map).length} 個空位數據`);
      return true;
    } catch (err) {
      console.warn('Vacancy fetch failed:', err);
      const cached = loadVacancyCache();
      if (cached) {
        vacancyMap = cached;
        document.getElementById('offline-banner').classList.remove('hidden');
        setStatus('使用快取嘅空位資料');
        return false;
      }
      setStatus('空位資料唔可用 — 只顯示靜態資料');
      return false;
    }
  }

  async function loadFullDataInBackground() {
    setStatus('附近 EV 已顯示 · 背景載入全港資料…');
    await fetchCarParkInfo();
    await fetchVacancy();
    fullDataReady = true;
    bootstrapActive = false;
    render();
  }

  /* ----- Helpers ----- */
  function haversineKm(lat1, lng1, lat2, lng2) {
    const R = 6371, toRad = d => d * Math.PI / 180;
    const dLat = toRad(lat2 - lat1), dLng = toRad(lng2 - lng1);
    const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function formatTime(d) {
    if (!d) return '—';
    return d.toLocaleTimeString('zh-HK', { hour: '2-digit', minute: '2-digit', hour12: false });
  }

  function formatAgo(iso) {
    if (!iso) return '';
    const mins = Math.round((Date.now() - new Date(iso)) / 60000);
    if (mins < 1) return '啱啱';
    if (mins < 60) return `${mins} 分鐘前`;
    return `${Math.round(mins/60)} 小時前`;
  }

  const CHARGER_LABELS = { working: '正常', broken: '壞咗' };

  function getVacancy(cp) {
    if (!cp.govId || !vacancyMap[cp.govId]) return null;
    return vacancyMap[cp.govId];
  }

  function vacancyLabel(v) {
    if (!v) return { text: '冇即時數據', color: 'text-slate-400', available: null };
    const type = v.vacancy_type;
    const spaces = v.vacancy;
    const evSpaces = v.vacancyEV;
    if (type === 'C') return { text: '停車場已關閉／已滿', color: 'text-red-400', available: false };
    if (spaces === 0) return { text: '0 個位', color: 'text-red-400', available: false };
    let text = `仲有 ${spaces} 個位`;
    if (evSpaces !== undefined && evSpaces !== null) text += ` · ${evSpaces} 個 EV 空置`;
    return { text, color: spaces > 5 ? 'text-emerald-400' : 'text-amber-400', available: spaces > 0 };
  }

  function markerColor(cp) {
    const report = reports[cp.id];
    if (report?.parkingFull) return '#ef4444';
    const v = getVacancy(cp);
    const vl = vacancyLabel(v);
    if (vl.available === false) return '#ef4444';
    if (vl.available === true) return vl.text.includes('0') ? '#f59e0b' : '#10b981';
    if (report?.chargerStatus === 'broken') return '#f59e0b';
    return '#3b82f6'; // unknown / no data
  }

  function getSearchQuery() {
    return (document.getElementById('search-input')?.value || '').trim();
  }

  function detectArea(q) {
    const raw = (q || '').trim().toLowerCase().replace(/\s+/g, '');
    if (raw.length < 2) return null;
    let best = null, bestScore = 0;
    for (const area of AREA_INDEX) {
      for (const name of area.names) {
        const nn = name.toLowerCase().replace(/\s+/g, '');
        let score = 0;
        if (raw === nn) score = 100 + nn.length;
        else if (nn.startsWith(raw) || raw.startsWith(nn)) score = 60 + Math.min(raw.length, nn.length);
        else if (nn.includes(raw) || raw.includes(nn)) score = 30 + Math.min(raw.length, nn.length);
        if (score > bestScore) { bestScore = score; best = area; }
      }
    }
    return bestScore >= 30 ? best : null;
  }

  function inAreaBounds(cp, bounds) {
    return cp.lat >= bounds.south && cp.lat <= bounds.north
      && cp.lng >= bounds.west && cp.lng <= bounds.east;
  }

  function areaNameInText(cp, area) {
    const hay = [cp.name, cp.nameEn, cp.address, cp.district, cp.subDistrict]
      .filter(Boolean).join(' ').toLowerCase();
    return area.names.some(n => hay.includes(n.toLowerCase()));
  }

  function matchesSearch(cp, q) {
    if (!q) return true;
    const area = detectArea(q);
    if (area) return inAreaBounds(cp, area.bounds) || areaNameInText(cp, area);
    const ql = q.toLowerCase();
    const haystack = [cp.name, cp.nameEn, cp.address, cp.note, cp.district, cp.subDistrict, cp.id]
      .filter(Boolean).join(' ').toLowerCase();
    return ql.split(/\s+/).every(term => haystack.includes(term));
  }

  function applySpacesFilter(list) {
    if (!document.getElementById('filter-spaces').checked) return list;
    return list.filter(cp => {
      const v = getVacancy(cp);
      if (v) return v.vacancy_type !== 'C' && v.vacancy > 0;
      return !reports[cp.id]?.parkingFull;
    });
  }

  function getFiltered() {
    const evOnly = document.getElementById('filter-ev').checked;
    const nearOnly = document.getElementById('filter-near').checked;
    const spacesOnly = document.getElementById('filter-spaces').checked;
    const query = getSearchQuery();

    // 快速啟動：未載入全港資料時，預設顯示附近 10 個 EV 站
    if (bootstrapActive && !fullDataReady && !query && !nearOnly) {
      let list = CARPARKS.filter(cp => cp.hasEV);
      if (spacesOnly) list = applySpacesFilter(list);
      return sortByDistance(list, getPositionAnchor()).slice(0, NEARBY_BOOTSTRAP_COUNT);
    }

    let list = CARPARKS.filter(cp => !evOnly || cp.hasEV);
    if (query) list = list.filter(cp => matchesSearch(cp, query));

    if (nearOnly && userPos) {
      list = list.filter(cp => haversineKm(userPos.lat, userPos.lng, cp.lat, cp.lng) <= NEAR_RADIUS_KM);
    }

    if (spacesOnly) list = applySpacesFilter(list);

    if (userPos && !query) list = sortByDistance(list, userPos);
    return list;
  }

  function isBootstrapView() {
    return bootstrapActive && !fullDataReady && !getSearchQuery()
      && !document.getElementById('filter-near').checked;
  }

  function fitMapToList(list) {
    if (!list.length) return;
    if (list.length === 1) {
      map.setView([list[0].lat, list[0].lng], Math.max(map.getZoom(), 16));
      return;
    }
    const bounds = L.latLngBounds(list.map(cp => [cp.lat, cp.lng]));
    map.fitBounds(bounds.pad(0.15), { maxZoom: 16 });
  }

  function fitMapToArea(area) {
    const b = area.bounds;
    map.fitBounds([[b.south, b.west], [b.north, b.east]], { maxZoom: 15, padding: [40, 40] });
  }

  function showAreaHighlight(area) {
    if (areaLayer) { map.removeLayer(areaLayer); areaLayer = null; }
    if (!area) return;
    const b = area.bounds;
    areaLayer = L.rectangle([[b.south, b.west], [b.north, b.east]], {
      color: '#10b981', weight: 2, fillColor: '#10b981', fillOpacity: 0.08, dashArray: '6 4'
    }).addTo(map);
  }

  function setStatus(msg) {
    document.getElementById('status-bar').textContent = msg;
  }

  /* ----- Map ----- */
  function initMap() {
    map = L.map('map', { zoomControl: false, attributionControl: true })
      .setView(MAP_CENTER, MAP_ZOOM);
    L.control.zoom({ position: 'bottomright' }).addTo(map);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OSM &copy; CARTO',
      maxZoom: 19
    }).addTo(map);
    markersLayer = L.layerGroup().addTo(map);
  }

  function makeIcon(color, isEV = true) {
    const sym = isEV ? '⚡' : 'P';
    return L.divIcon({
      className: '',
      html: `<div class="marker-pin" style="background:${color}">
               <div class="marker-inner">${sym}</div>
             </div>`,
      iconSize: [28, 28], iconAnchor: [14, 28], popupAnchor: [0, -28]
    });
  }

  function renderMarkers(list) {
    markersLayer.clearLayers();
    const onMap = list.length > MAP_MARKER_LIMIT ? list.slice(0, MAP_MARKER_LIMIT) : list;
    onMap.forEach(cp => {
      const m = L.marker([cp.lat, cp.lng], { icon: makeIcon(markerColor(cp), cp.hasEV) });
      m.on('click', () => openDetail(cp.id));
      m.bindTooltip(cp.name, { direction: 'top', offset: [0, -30] });
      markersLayer.addLayer(m);
    });
  }

  function showUserLocation(lat, lng) {
    if (userMarker) map.removeLayer(userMarker);
    userMarker = L.circleMarker([lat, lng], {
      radius: 8, color: '#60a5fa', fillColor: '#3b82f6', fillOpacity: 0.9, weight: 3
    }).addTo(map);
    if (document.getElementById('filter-near').checked) {
      map.setView([lat, lng], 15);
    }
  }

  /* ----- List & detail UI ----- */
  function renderList(list) {
    const el = document.getElementById('list-scroll');
    const q = getSearchQuery();
    const area = detectArea(q);
    const mapNote = list.length > MAP_MARKER_LIMIT ? `（地圖顯示 ${MAP_MARKER_LIMIT} 個）` : '';
    const areaNote = area ? `${area.label} · ` : '';
    const bootNote = isBootstrapView() ? '附近 · ' : '';
    document.getElementById('list-summary').textContent =
      `${bootNote}${areaNote}${list.length} 個停車場${mapNote}`;

    if (!list.length) {
      const msg = area
        ? `「${esc(area.label)}」暫時冇符合條件嘅停車場 — 試下關掉「淨係 EV」或其他篩選。`
        : q
          ? `搵唔到「${esc(q)}」— 試下其他地區或關鍵字。`
          : '冇相符結果 — 試下關掉篩選條件。';
      el.innerHTML = `<p class="text-slate-400 text-sm text-center py-4">${msg}</p>`;
      return;
    }

    el.innerHTML = list.map(cp => {
      const v = getVacancy(cp);
      const vl = vacancyLabel(v);
      const dist = userPos
        ? `<span class="text-slate-500">${haversineKm(userPos.lat, userPos.lng, cp.lat, cp.lng).toFixed(1)} km</span>`
        : '';
      const report = reports[cp.id];
      const badge = report?.parkingFull
        ? '<span class="text-red-400 text-xs">已滿（有人報告）</span>'
        : report?.chargerStatus === 'broken'
          ? '<span class="text-amber-400 text-xs">充電器有問題</span>'
          : '';
      const price = priceSummary(cp);
      return `
        <button type="button" data-id="${cp.id}"
          class="w-full text-left p-3 rounded-xl bg-slate-800 active:bg-slate-700 border border-slate-700/50">
          <div class="flex justify-between items-start gap-2">
            <div class="min-w-0">
              <p class="font-semibold truncate">${esc(cp.name)}</p>
              <p class="text-xs text-slate-400 truncate">${esc(cp.address)}</p>
            </div>
            ${dist}
          </div>
          <div class="flex flex-wrap gap-2 mt-1.5 text-xs items-center">
            ${cp.hasEV
              ? '<span class="text-emerald-400">⚡ 有 EV</span>'
              : '<span class="text-slate-500">泊車場</span>'}
            <span class="${vl.color}">${esc(vl.text)}</span>
            ${badge}
          </div>
          ${price ? `<p class="text-xs text-slate-500 mt-1 truncate">💰 ${esc(price)}</p>` : ''}
        </button>`;
    }).join('');

    el.querySelectorAll('button[data-id]').forEach(btn => {
      btn.addEventListener('click', () => openDetail(btn.dataset.id));
    });
  }

  function openDetail(id) {
    selectedId = id;
    const cp = CARPARKS.find(c => c.id === id);
    if (!cp) return;

    const v = getVacancy(cp);
    const vl = vacancyLabel(v);
    const report = reports[cp.id] || {};
    const lastApi = v?.lastupdate ? new Date(v.lastupdate.replace(' ', 'T') + '+08:00') : null;
    const gmaps = `https://www.google.com/maps/dir/?api=1&destination=${cp.lat},${cp.lng}&travelmode=driving`;

    document.getElementById('detail-content').innerHTML = `
      <div class="flex justify-between items-start">
        <div>
          <h2 class="text-xl font-bold">${esc(cp.name)}</h2>
          ${cp.nameEn ? `<p class="text-sm text-slate-400">${esc(cp.nameEn)}</p>` : ''}
        </div>
        <button id="detail-close" type="button" class="w-10 h-10 rounded-full bg-slate-800 text-xl leading-none" aria-label="關閉">×</button>
      </div>
      <p class="text-slate-300">${esc(cp.address)}</p>
      ${cp.note ? `<p class="text-xs text-slate-500 bg-slate-800/50 rounded-lg p-2">${esc(cp.note)}</p>` : ''}

      <div class="grid grid-cols-2 gap-3">
        <div class="bg-slate-800 rounded-xl p-3">
          <p class="text-xs text-slate-400">EV 充電</p>
          <p class="text-lg font-bold text-emerald-400">${cp.hasEV ? '✓ 有' : '✗ 冇'}</p>
          ${cp.evSpaces ? `<p class="text-xs text-slate-500">${cp.evSpaces} 個車位（政府數據）</p>` : ''}
        </div>
        <div class="bg-slate-800 rounded-xl p-3">
          <p class="text-xs text-slate-400">泊車空位</p>
          <p class="text-lg font-bold ${vl.color}">${esc(vl.text)}</p>
          ${lastApi ? `<p class="text-xs text-slate-500">政府數據：${formatTime(lastApi)}</p>` : '<p class="text-xs text-slate-500">冇政府即時數據</p>'}
        </div>
      </div>

      ${(cp.parkHourly != null || cp.evChargeDetail) ? `
      <div class="bg-slate-800/80 rounded-xl p-3 space-y-2">
        <p class="text-xs font-medium text-slate-300">💰 收費參考</p>
        ${cp.parkHourly != null ? `<p class="text-sm"><span class="text-slate-400">泊車</span> <span class="text-slate-200">$${cp.parkHourly}/小時</span> <span class="text-xs text-slate-500">（政府數據）</span></p>` : ''}
        ${cp.evChargeDetail ? `<p class="text-sm"><span class="text-slate-400">充電</span> <span class="text-emerald-300/90">${esc(cp.evChargeDetail)}</span></p>` : (cp.hasEV ? '<p class="text-sm text-slate-500">充電價錢未有公開數據 — 到場或查商場 App</p>' : '')}
        <p class="text-xs text-slate-600">價錢可能有變，以現場／充電 App 為準</p>
      </div>` : (cp.hasEV ? `
      <p class="text-xs text-slate-500 bg-slate-800/50 rounded-lg p-2">充電同泊車價錢未有公開數據 — 建議到場或查商場 App 確認</p>` : '')}

      <a href="${gmaps}" target="_blank" rel="noopener"
        class="tap-target block w-full text-center py-4 rounded-2xl bg-emerald-600 active:bg-emerald-500
               text-lg font-bold shadow-lg shadow-emerald-900/40">
        🧭 用 Google Maps 導航
      </a>

      <div class="flex items-center gap-1.5 flex-wrap pt-2 border-t border-slate-800">
        <span class="text-xs text-slate-500 shrink-0">報告</span>
        ${report.chargerStatus || report.parkingFull
          ? `<span class="text-xs text-amber-400/80">${formatAgo(report.updatedAt)}</span>` : ''}
        <button type="button" data-report="charger-working"
          class="px-2 py-1 rounded-md bg-slate-800 text-xs text-slate-400 active:bg-emerald-900/50 active:text-emerald-300">
          ✓ 正常
        </button>
        <button type="button" data-report="charger-broken"
          class="px-2 py-1 rounded-md bg-slate-800 text-xs text-slate-400 active:bg-amber-900/50 active:text-amber-300">
          ✗ 壞
        </button>
        <button type="button" data-report="parking-full"
          class="px-2 py-1 rounded-md bg-slate-800 text-xs text-slate-400 active:bg-red-900/50 active:text-red-300">
          滿
        </button>
        ${report.chargerStatus || report.parkingFull ? `
        <button type="button" data-report="clear"
          class="px-2 py-1 text-xs text-slate-600 active:text-slate-400">
          清除
        </button>` : ''}
      </div>
    `;

    document.getElementById('detail-overlay').classList.remove('hidden');
    document.getElementById('detail-sheet').classList.remove('hidden');

    document.getElementById('detail-close').onclick = closeDetail;
    document.getElementById('detail-overlay').onclick = closeDetail;

    document.querySelectorAll('[data-report]').forEach(btn => {
      btn.onclick = () => {
        const action = btn.dataset.report;
        if (action === 'charger-working') saveReport(id, { chargerStatus: 'working', parkingFull: false });
        else if (action === 'charger-broken') saveReport(id, { chargerStatus: 'broken' });
        else if (action === 'parking-full') saveReport(id, { parkingFull: true });
        else if (action === 'clear') { delete reports[id]; localStorage.setItem(STORAGE_REPORTS, JSON.stringify(reports)); render(); openDetail(id); }
      };
    });

    map.setView([cp.lat, cp.lng], Math.max(map.getZoom(), 16));
  }

  function closeDetail() {
    selectedId = null;
    document.getElementById('detail-overlay').classList.add('hidden');
    document.getElementById('detail-sheet').classList.add('hidden');
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }

  function render() {
    const list = getFiltered();
    const q = getSearchQuery();
    const area = detectArea(q);
    renderMarkers(list);
    renderList(list);
    if (area) {
      showAreaHighlight(area);
      fitMapToArea(area);
    } else {
      showAreaHighlight(null);
      if ((q || isBootstrapView()) && list.length) fitMapToList(list);
    }
  }

  function onSearchInput() {
    const input = document.getElementById('search-input');
    const clearBtn = document.getElementById('search-clear');
    clearBtn.hidden = !input.value;
    if (input.value.trim()) bootstrapActive = false;
    render();
    if (input.value.trim()) {
      const panel = document.getElementById('list-panel');
      panel.style.maxHeight = '55vh';
      listExpanded = true;
    }
  }

  function clearSearch() {
    const input = document.getElementById('search-input');
    input.value = '';
    document.getElementById('search-clear').hidden = true;
    showAreaHighlight(null);
    map.setView(MAP_CENTER, MAP_ZOOM);
    input.focus();
    render();
  }

  /* ----- Geolocation ----- */
  function onLocationFound(pos, accuracy) {
    userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    saveLastPosition();
    showUserLocation(userPos.lat, userPos.lng);
    if (bootstrapActive && !fullDataReady) {
      setStatus(`附近 ${NEARBY_BOOTSTRAP_COUNT} 個 EV 站 · 誤差約 ±${Math.round(accuracy)} 米`);
    } else {
      setStatus(`已找到位置 · 誤差約 ±${Math.round(accuracy)} 米`);
    }
    render();
  }

  function requestLocationAsync() {
    return new Promise(resolve => {
      if (!navigator.geolocation) { resolve(false); return; }
      navigator.geolocation.getCurrentPosition(
        pos => { onLocationFound(pos, pos.coords.accuracy); resolve(true); },
        () => {
          if (!userPos) setStatus('定位被拒絕 — 顯示預設附近 EV 站');
          resolve(false);
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 120000 }
      );
    });
  }

  function requestLocation() {
    if (!navigator.geolocation) { setStatus('呢部機唔支援定位'); return; }
    setStatus('正在定位…');
    requestLocationAsync();
  }

  /* ----- Events ----- */
  function bindEvents() {
    ['filter-ev', 'filter-near', 'filter-spaces'].forEach(id => {
      document.getElementById(id).addEventListener('change', () => {
        if (id === 'filter-near' || id === 'filter-ev') bootstrapActive = false;
        render();
      });
    });
    const searchInput = document.getElementById('search-input');
    let searchTimer;
    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(onSearchInput, 120);
    });
    searchInput.addEventListener('search', onSearchInput);
    document.getElementById('search-clear').addEventListener('click', clearSearch);

    document.getElementById('btn-locate').addEventListener('click', requestLocation);
    document.getElementById('btn-refresh').addEventListener('click', async () => {
      document.getElementById('btn-refresh').classList.add('animate-spin');
      await Promise.all([fetchCarParkInfo(true), fetchVacancy()]);
      render();
      document.getElementById('btn-refresh').classList.remove('animate-spin');
    });

    const panel = document.getElementById('list-panel');
    document.getElementById('list-handle').addEventListener('click', () => {
      listExpanded = !listExpanded;
      panel.style.maxHeight = listExpanded ? '70vh' : '42vh';
    });

    window.addEventListener('online', () => fetchVacancy().then(render));
    window.addEventListener('offline', () => document.getElementById('offline-banner').classList.remove('hidden'));
  }

  /* ----- Boot ----- */
  async function init() {
    setupPWA();
    initMap();
    bindEvents();

    const cachedParks = loadCarParkCache();
    const cachedVacancy = loadVacancyCache();
    if (cachedVacancy) vacancyMap = cachedVacancy;

    if (cachedParks?.length) {
      // 有快取：直接全港模式，幾乎即時
      CARPARKS = cachedParks;
      fullDataReady = true;
      bootstrapActive = false;
      restoreLastPosition();
      setStatus(cachedVacancy ? '已載入快取資料' : '正在攞即時空位…');
      render();
      requestLocationAsync();
      if (!cachedVacancy) await fetchVacancy();
      else setStatus(`已更新快取 · 全港 ${CARPARKS.length} 個停車場`);
      render();
    } else {
      // 首次載入：種子資料即時顯示附近 10 個 EV 站
      CARPARKS = buildSeedCarParks();
      bootstrapActive = true;
      fullDataReady = false;
      restoreLastPosition();
      setStatus(`顯示附近 ${NEARBY_BOOTSTRAP_COUNT} 個 EV 站…`);
      render();

      const geoPromise = requestLocationAsync();
      const vacancyPromise = cachedVacancy
        ? Promise.resolve(true)
        : fetchVacancyForIds(seedGovIds(), true);
      await Promise.all([geoPromise, vacancyPromise]);
      render();

      loadFullDataInBackground();
    }

    refreshTimer = setInterval(async () => {
      if (document.hidden) return;
      await fetchVacancy();
      render();
    }, REFRESH_MS);
  }

  document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
